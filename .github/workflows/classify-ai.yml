name: Classify papers with GitHub Models
on:
  push:
    branches: [master]
    paths:
      - "ai_classifier.py"
  schedule:
    # Once daily, after the 05:17 UTC arXiv metadata scan has completed.
    - cron: "17 6 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: Maximum papers to classify in this run
        required: false
        default: "20"
permissions:
  contents: write
  models: read
concurrency:
  group: exciton-ai-classification
  cancel-in-progress: false
jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Classify the latest arXiv week with rate control
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_MODEL: openai/gpt-4o-mini
          INPUT_LIMIT: ${{ inputs.limit }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            # Recovery batch; restored to 3 after the classifier trigger commit.
            LIMIT=20
          else
            LIMIT="${INPUT_LIMIT:-20}"
          fi
          python ai_classifier.py --days 7 --limit "$LIMIT" --delay 8
      - name: Commit classification progress
        run: |
          if git diff --quiet -- data/ai_classifications.json; then
            echo "No classification changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai_classifications.json
          git commit -m "data: update AI paper classifications"
          git pull --rebase origin master
          git push
