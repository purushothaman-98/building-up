name: Backfill June 2026 exciton papers
on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/backfill-june.yml"
      - "scripts/run_backfill.py"
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: arxiv-metadata-scan
  cancel-in-progress: false
jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Process bounded June windows
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            python scripts/run_backfill.py
          else
            python scripts/run_backfill.py --all --pause 5
          fi
      - name: Publish backfill progress
        run: |
          if git diff --quiet -- data/papers.json data/backfill_state.json; then
            echo "June backfill is already complete"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config merge.exciton-archive.name "Merge Exciton Scanner JSON archives"
          git config merge.exciton-archive.driver "python scripts/merge_papers_conflict.py %O %A %B"
          git add data/papers.json data/backfill_state.json
          git commit -m "data: backfill June 2026 exciton papers"
          git pull --rebase origin master
          git push
