name: Scan arXiv for exciton papers
on:
  push:
    branches: [master]
    paths:
      - "arxiv_scanner.py"
      - ".github/workflows/scan-arxiv.yml"
  schedule:
    - cron: "17 1,9,17 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: arxiv-metadata-scan
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Query official arXiv API
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SINCE="$(date -u -d '21 days ago' +%F)"
          else
            SINCE="2026-01-01"
          fi
          python arxiv_scanner.py --output data/papers.json --since "$SINCE" --max-results 2000
      - name: Commit archive changes
        run: |
          if git diff --quiet -- data/papers.json; then
            echo "No metadata changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers.json
          git commit -m "data: update arXiv exciton archive"
          git pull --rebase origin master
          git push
