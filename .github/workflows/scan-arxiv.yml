name: Scan arXiv for exciton papers
on:
  push:
    branches: [master]
    paths:
      - "arxiv_scanner.py"
      - "scripts/merge_papers_conflict.py"
      - ".gitattributes"
      - ".github/workflows/scan-arxiv.yml"
  schedule:
    # GitHub cron is best-effort. Three staggered triggers provide daily redundancy;
    # the due check below permits only one metadata scan per UTC day.
    - cron: "37 3 * * *"
    - cron: "43 9 * * *"
    - cron: "53 15 * * *"
  workflow_dispatch:
    inputs:
      since:
        description: Earliest submission date for a manual rebuild
        required: false
        default: "2026-07-01"
permissions:
  contents: write
concurrency:
  group: arxiv-metadata-scan
  cancel-in-progress: false
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Check whether today's scheduled scan is due
        id: due
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LAST_SCAN="$(python -c 'import json; print(json.load(open("data/papers.json")).get("last_scan", ""))')"
          TODAY="$(date -u +%F)"
          if [ "${LAST_SCAN:0:10}" = "$TODAY" ]; then
            echo "Daily scan already completed at $LAST_SCAN"
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "No completed scan recorded for $TODAY"
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Query official arXiv API
        if: steps.due.outputs.run == 'true'
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            SINCE="$(date -u -d '14 days ago' +%F)"
          else
            SINCE="${{ inputs.since || '2026-07-01' }}"
          fi
          python arxiv_scanner.py --output data/papers.json --since "$SINCE" --max-results 2000
      - name: Commit archive changes
        if: steps.due.outputs.run == 'true'
        run: |
          if git diff --quiet -- data/papers.json; then
            echo "No metadata changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config merge.exciton-archive.name "Merge Exciton Scanner JSON archives"
          git config merge.exciton-archive.driver "python scripts/merge_papers_conflict.py %O %A %B"
          git add data/papers.json
          git commit -m "data: update arXiv exciton archive"
          git pull --rebase origin master
          git push
